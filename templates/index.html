<!doctype html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KawanKampus Bot (Pure Backend Workflow)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #f5f7fb;
        -webkit-tap-highlight-color: transparent;
      }
      .chat-scroll::-webkit-scrollbar {
        width: 0;
      }
      .message-anim {
        animation: fadeUp 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        will-change: transform, opacity;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .markdown-body {
        line-height: 1.7;
        font-size: 14px;
      }
      .markdown-body p {
        margin-bottom: 8px;
      }
      .glass {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }
      .pulse-ring {
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(1.5);
          opacity: 0;
        }
      }
      /* Izinkan link berwarna indigo */
      .markdown-body a {
        color: #4f46e5;
        text-decoration: underline;
      }

      /* Style tombol pilihan di chat stream (Mode Bot) */
      .chat-option-btn {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 10px 16px;
        text-align: left;
        font-size: 12px;
        transition: all 0.2s;
        width: 100%;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .chat-option-btn:hover {
        background: #f9fafb;
        border-color: #d1d5db;
        transform: translateX(2px);
      }
    </style>
  </head>
  <body class="h-screen overflow-hidden flex flex-col">
    <div class="flex-1 flex flex-col h-full">
      <header class="h-16 glass border-b border-white/30 flex items-center justify-between px-5">
        <div class="flex items-center gap-3">
          <div class="relative w-10 h-10 rounded-xl bg-indigo-600 text-white flex items-center justify-center font-black shadow-lg">
            K
            <div class="absolute -bottom-1 -right-1">
              <div class="w-3 h-3 rounded-full bg-green-500"></div>
              <div class="absolute inset-0 w-3 h-3 rounded-full bg-green-500 pulse-ring"></div>
            </div>
          </div>
          <div>
            <h2 class="font-bold text-sm">KawanKampus Bot</h2>
            <p class="text-xs text-green-500">Online</p>
          </div>
        </div>
      </header>

      <main id="chat-stream" class="flex-1 overflow-y-auto px-4 py-6 chat-scroll">
        <div class="max-w-3xl mx-auto">
          <div id="intro-section" class="flex flex-col items-center text-center py-20">
            <div class="w-20 h-20 rounded-full bg-indigo-100 flex items-center justify-center mb-5 shadow-lg"><i class="fa-solid fa-robot text-3xl text-indigo-600"></i></div>
            <h1 class="text-3xl font-bold mb-2">Hai 👋</h1>
            <p class="text-gray-500 text-sm mb-8">Pilih bantuan yang ingin kamu gunakan:</p>
            <div class="grid grid-cols-2 gap-3 w-full max-w-xl">
              <button onclick="startRecommendationWorkflow()" class="glass border border-white/30 rounded-2xl p-4 text-left hover:scale-[1.02] transition">
                <div class="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center mb-3"><i class="fa-solid fa-location-dot text-indigo-500"></i></div>
                <h3 class="font-semibold text-sm">Rekomendasi Tempat</h3>
                <p class="text-xs text-gray-400 mt-1">Cari kos, warkop terdekat</p>
              </button>
              <button onclick="startTaskWorkflow()" class="glass border border-white/30 rounded-2xl p-4 text-left hover:scale-[1.02] transition">
                <div class="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center mb-3"><i class="fa-solid fa-book text-indigo-500"></i></div>
                <h3 class="font-semibold text-sm">Bantu Tugas (AI)</h3>
                <p class="text-xs text-gray-400 mt-1">Tanya materi kuliah</p>
              </button>
            </div>
          </div>

          <div id="messages-list" class="space-y-6"></div>

          <div id="typing-indicator" class="hidden mt-6 flex items-start gap-3">
            <div class="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center"><i class="fa-solid fa-robot text-indigo-600"></i></div>
            <div class="glass border border-white/30 px-5 py-4 rounded-2xl flex gap-2">
              <div class="w-2 h-2 bg-indigo-300 rounded-full animate-bounce"></div>
              <div class="w-2 h-2 bg-indigo-300 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
              <div class="w-2 h-2 bg-indigo-300 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
            </div>
          </div>
        </div>
      </main>

      <footer class="p-4 bg-gradient-to-t from-white/60 to-transparent">
        <div class="max-w-3xl mx-auto">
          <form id="chat-form" class="glass border border-white/30 rounded-3xl shadow-xl flex items-center gap-2 p-2">
            <input id="chat-input" type="text" placeholder="Pilih tombol di atas..." class="flex-1 outline-none bg-transparent text-sm py-3 px-3 disabled:opacity-50" autocomplete="off" disabled />
            <button type="submit" id="send-btn" class="w-11 h-11 rounded-2xl bg-indigo-600 text-white flex items-center justify-center hover:bg-indigo-700 transition shadow-lg disabled:opacity-50" disabled>
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </form>
        </div>
      </footer>
    </div>

    <script>
      // Konfigurasi Marked agar mengizinkan link
      marked.setOptions({ gfm: true, breaks: true, sanitize: false, smartLists: true, smartypants: true });

      const API_BASE_URL = "http://localhost:5000";
      // ID User sederhana
      let USER_ID = localStorage.getItem("kk_user_id");
      if (!USER_ID) { USER_ID = crypto.randomUUID(); localStorage.setItem("kk_user_id", USER_ID); }

      const messagesList = document.getElementById("messages-list");
      const introSection = document.getElementById("intro-section");
      const chatInput = document.getElementById("chat-input");
      const typingIndicator = document.getElementById("typing-indicator");
      const sendBtn = document.getElementById("send-btn");
      const chatStream = document.getElementById("chat-stream");

      // Variabel State Krusial untuk Mode Tugas
      let isTaskMode = false;

      // State Workflow Rekomendasi
      let workflowState = { univ: null, cat: null, lat: null, lon: null };

      function scrollToBottom() { chatStream.scrollTo({ top: chatStream.scrollHeight, behavior: "smooth" }); }

      // Render rekomendasi terstruktur, link Maps standar
      function renderRecommendations(items) {
        if (!items || items.length === 0) return "";
        let html = `<div class="mt-4 space-y-2 max-w-sm mx-auto">`;
        items.forEach((item) => {
          html += `
            <a href="${item.map_link}" target="_blank" class="bg-gray-50 border border-gray-100 rounded-2xl p-3 flex items-center gap-3 hover:bg-gray-100 transition block">
              <div class="w-11 h-11 rounded-xl bg-indigo-50 flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-location-dot text-indigo-500"></i></div>
              <div class="flex-1 min-w-0">
                <h4 class="font-semibold text-sm truncate text-gray-900">${item.name}</h4>
                <div class="text-[11px] text-gray-400 mt-1 flex gap-3"><span>${item.distance}</span></div>
                <p class="text-[10px] text-gray-400 mt-1 truncate">${item.hours}</p>
              </div>
              <i class="fa-solid fa-chevron-right text-gray-300 text-xs flex-shrink-0"></i>
            </a>`;
        });
        html += `</div>`;
        return html;
      }

      // Append Message handles text, bot options, and recommendations
      function appendMessage(text, sender, recommendationData = null, optionsHtml = null) {
        introSection.classList.add("hidden");
        const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        const div = document.createElement("div");
        div.className = "message-anim";

        if (sender === "user") {
          div.innerHTML = `
            <div class="flex justify-end items-start gap-3">
              <div class="max-w-[85%] bg-indigo-600 text-white px-5 py-4 rounded-3xl rounded-br-md shadow-lg"><div class="text-sm leading-relaxed">${text}</div><div class="text-[10px] mt-2 text-indigo-200 text-right">${time}</div></div>
              <div class="w-10 h-10 rounded-xl bg-gray-900 text-white flex items-center justify-center flex-shrink-0 shadow-lg"><i class="fa-solid fa-user"></i></div>
            </div>`;
        } else {
          div.innerHTML = `
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center flex-shrink-0 shadow-lg"><i class="fa-solid fa-robot text-indigo-600"></i></div>
              <div class="max-w-[85%] glass border border-white/30 px-5 py-4 rounded-3xl rounded-tl-md shadow-lg">
                <div class="markdown-body">${marked.parse(text)}</div>
                ${optionsHtml ? optionsHtml : ""}
                ${recommendationData ? renderRecommendations(recommendationData) : ""}
                <div class="text-[10px] mt-3 text-gray-400">${time}</div>
              </div>
            </div>`;
        }
        messagesList.appendChild(div);
        scrollToBottom();
      }

      // **LOGIKA WORKFLOW REKOMENDASI TERTAHAP**

      async function startRecommendationWorkflow() {
        // Reset state & UI
        workflowState = { univ: null, cat: null, lat: null, lon: null };
        isTaskMode = false; // Matikan mode tugas jika sebelumnya aktif

        introSection.classList.add("hidden");
        chatInput.disabled = true; sendBtn.disabled = true; chatInput.placeholder = "Ikuti workflow tombol...";

        appendMessage("Hai 👋, aku asisten rekomendasi tempat terdekat murni backend. Silakan ikuti tombol.", "bot");
        typingIndicator.classList.remove("hidden");

        try {
            // Ambil daftar kampus dinamis yang sudah dibersihkan backend
            const res = await fetch(`${API_BASE_URL}/data/config`);
            const config = await res.json();
            typingIndicator.classList.add("hidden");

            // Tampilkan tombol Kampus (Grid cols-2 karena ada 10)
            let optionsHtml = `<div class="mt-4 grid grid-cols-2 gap-2 max-w-sm mx-auto">`;
            config.kampus.forEach(uni => {
                optionsHtml += `<button class="chat-option-btn" onclick="selectUnivWorkflow('${uni}')"><i class="fa-solid fa-university text-indigo-400 text-xs"></i> ${uni}</button>`;
            });
            optionsHtml += `</div>`;
            appendMessage("Universitas mana yang ingin kamu cari sekitarnya?", "bot", null, optionsHtml);

        } catch (e) { typingIndicator.classList.add("hidden"); appendMessage("Gagal mengambil data kampus.", "bot"); }
      }

      function selectUnivWorkflow(univName) {
        if (workflowState.univ) return; // Prevent double click
        workflowState.univ = univName;
        appendMessage(univName, 'user');

        typingIndicator.classList.remove("hidden");
        setTimeout(async () => {
             typingIndicator.classList.add("hidden");
             try {
                 // Ambil kategori dinamis yang sudah dibersihkan backend
                 const res = await fetch(`${API_BASE_URL}/data/config`);
                 const config = await res.json();

                 // Tampilkan tombol Kategori (Grid cols-2 karena banyak)
                 let optionsHtml = `<div class="mt-4 grid grid-cols-2 gap-2 max-w-sm mx-auto chat-scroll overflow-y-auto max-h-60 p-1 border border-gray-100 rounded-xl bg-gray-50">`;
                 config.kategori.forEach(cat => {
                     optionsHtml += `<button class="chat-option-btn" onclick="selectCategoryWorkflow('${cat}')"><i class="fa-solid fa-tags text-indigo-400 text-xs"></i> ${cat}</button>`;
                 });
                 optionsHtml += `</div>`;
                 appendMessage(`Sip, ${univName}. Sekarang kategori apa yang kamu cari?`, "bot", null, optionsHtml);
             } catch(e) { appendMessage("Gagal mengambil data kategori.", "bot"); }
        }, 400);
      }

      function selectCategoryWorkflow(categoryName) {
        if (workflowState.cat) return; // Prevent double click
        workflowState.cat = categoryName;
        appendMessage(categoryName, 'user');

        appendMessage("Terakhir, aku butuh izin akses lokasi browser kamu nih buat nyari terdekat. Izinin ya?", "bot");

        // Minta lokasi browser
        if (!navigator.geolocation) {
            appendMessage("Aduh, browser kamu ga mendukung lokasi.", "bot");
            return;
        }

        typingIndicator.classList.remove("hidden");
        navigator.geolocation.getCurrentPosition(
            (position) => {
                workflowState.lat = position.coords.latitude;
                workflowState.lon = position.coords.longitude;
                appendMessage("Lokasi didapat! Bentar ya cariin yang paling dekat...", "bot");
                executeBackendRecommendation();
            },
            () => {
                typingIndicator.classList.add("hidden");
                appendMessage("Gagal ngakses lokasi. Fitur rekomendasi terdekat ga bisa dipakai.", "bot");
            },
            { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
        );
      }

      // Fungsi mengirim request rekomendasi berkoordinat ke Backend murni
      async function executeBackendRecommendation() {
        typingIndicator.classList.remove("hidden");
        scrollToBottom();

        try {
          const formData = new FormData();
          formData.append("lat", workflowState.lat);
          formData.append("lon", workflowState.lon);
          formData.append("selected_uni", workflowState.univ);
          formData.append("selected_cat", workflowState.cat);
          formData.append("special_action", "recommendation_proximity");

          const response = await fetch(`${API_BASE_URL}/chat`, { method: "POST", body: formData });
          const data = await response.json();
          typingIndicator.classList.add("hidden");

          if (data.success) {
            appendMessage(data.reply, "bot", data.recommendations);

            // Workflow selesai, tanyakan mau mengulang?
            setTimeout(() => {
                let optionsHtml = `<div class="mt-4 flex gap-2 max-w-sm mx-auto">
                    <button class="chat-option-btn flex-1 justify-center" onclick="restartWorkflowChoice('ya')"><i class="fa-solid fa-rotate-left text-indigo-400 text-xs"></i> Ya, cari lagi</button>
                    <button class="chat-option-btn flex-1 justify-center" onclick="restartWorkflowChoice('tidak')"><i class="fa-solid fa-xmark text-red-400 text-xs"></i> Selesai</button>
                </div>`;
                appendMessage("Apakah kamu ingin mencari rekomendasi tempat lain?", "bot", null, optionsHtml);
            }, 1000);

          } else {
            appendMessage(data.error || "Gagal mengambil rekomendasi murni backend.", "bot");
            // Aktifkan input kembali jika gagal
            chatInput.disabled = false; sendBtn.disabled = false; chatInput.placeholder = "Ketik pesan...";
          }
        } catch (err) { typingIndicator.classList.add("hidden"); appendMessage("Backend offline", "bot"); }
      }

      // --- PERBAIKAN: Menangani pilihan mengulang workflow ---
      function restartWorkflowChoice(choice) {
          if (choice === 'ya') {
              appendMessage("Ya, cari lagi", 'user');
              startRecommendationWorkflow();
          } else {
              appendMessage("Selesai", 'user');

              // --- TAMBAHAN DI SINI: Menyisipkan tombol Bantu Tugas ---
              let botMessage = "Oke! 😊 Jika kamu butuh bantuan lain atau ingin bertanya tentang materi kuliah, klik tombol di bawah ya.";
              let optionsHtml = `<div class="mt-4 max-w-sm mx-auto">
                  <button class="chat-option-btn justify-center w-full" onclick="handleTaskWorkflowInline()">
                      <i class="fa-solid fa-book text-indigo-400 text-xs"></i> Bantu Tugas
                  </button>
              </div>`;

              appendMessage(botMessage, "bot", null, optionsHtml);

              // Aktifkan input chat biasa JIC (walaupun workflow bot masih berlanjut via tombol)
              chatInput.disabled = false; sendBtn.disabled = false; chatInput.placeholder = "Ketik pesan...";
          }
      }

      // **LOGIKA BANTU TUGAS (AI)**

      // Fungsi Bantu Tugas Sederhana (Aktifkan isTaskMode)
      function startTaskWorkflow() {
        // Jika dipanggil dari Intro Section
        introSection.classList.add("hidden");

        // Aktifkan input chat
        chatInput.disabled = false;
        sendBtn.disabled = false;
        chatInput.placeholder = "Tanya tentang tugas atau materi...";

        // --- KRUSIAL: Aktifkan Flag Mode Tugas ---
        isTaskMode = true;

        appendMessage("Tentu, aku siap bantu tugas atau jelasin materi kuliah! Silakan tanyakan di sini deh.", "bot");
        chatInput.focus();
      }

      // --- TAMBAHAN: Handler khusus untuk tombol Bantu Tugas inline ---
      function handleTaskWorkflowInline() {
           // Simulasikan user menekan tombol
           appendMessage("[Bantu Tugas]", 'user');

           // Panggil logika aktifkan mode tugas
           introSection.classList.add("hidden"); // JIC
           chatInput.disabled = false;
           sendBtn.disabled = false;
           chatInput.placeholder = "Tanya tentang tugas atau materi...";
           isTaskMode = true; // Aktifkan flag Mode B (Vertex AI) di Backend

           appendMessage("Tentu, apa yang bisa saya bantu dengan tugas kuliah kamu? Silakan tanyakan di sini.", "bot");
           chatInput.focus();
      }

      // --- PERBAIKAN: Fungsi Chat (Kirim Flag task_mode) ---
      async function executeBackendChat(message) {
        typingIndicator.classList.remove("hidden");
        scrollToBottom();

        try {
          const formData = new FormData();
          formData.append("user_id", USER_ID);
          formData.append("message", message);

          // --- TAMBAHAN: Kirim flag jika sedang dalam mode tugas ---
          if (isTaskMode) {
              formData.append("task_mode", "true");
          }

          const response = await fetch(`${API_BASE_URL}/chat`, { method: "POST", body: formData });
          const data = await response.json();
          typingIndicator.classList.add("hidden");

          if (data.success) {
               appendMessage(data.reply || "AI tidak merespon", "bot");
          } else {
               if (data.error === "LIMIT_VERTEX") {
                    appendMessage("Aduh maaf, kuota AI lagi padat banget nih. Coba tanya lagi semenit kemudian ya.", "bot");
               } else {
                    appendMessage(data.error || "Gagal menghubungi AI.", "bot");
               }
          }

        } catch (err) { typingIndicator.classList.add("hidden"); appendMessage("Backend offline", "bot"); }
        finally {
             isWaiting = false;
             sendBtn.disabled = false;
             chatInput.focus();
        }
      }

      function processChat() {
        const msg = chatInput.value.trim();
        if (!msg) return;
        appendMessage(msg, "user");
        chatInput.value = "";
        executeBackendChat(msg);
      }

      document.getElementById("chat-form").addEventListener("submit", (e) => { e.preventDefault(); processChat(); });
      // Input dinonaktifkan di awal
    </script>
  </body>
</html>
