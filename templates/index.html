<!doctype html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KawanKampus - Asisten AI Cerdas</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      body {
        font-family: "Inter", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      /* Custom Scrollbar */
      .chat-scroll::-webkit-scrollbar {
        width: 5px;
      }
      .chat-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .chat-scroll::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 20px;
      }
      .chat-scroll::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }

      /* No Scrollbar for horizontal lists */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Markdown Content Styling */
      .markdown-body {
        line-height: 1.6;
        font-size: 0.95rem;
      }
      .markdown-body p {
        margin-bottom: 0.8rem;
      }
      .markdown-body ul {
        list-style-type: disc;
        padding-left: 1.25rem;
        margin-bottom: 0.8rem;
      }
      .markdown-body ol {
        list-style-type: decimal;
        padding-left: 1.25rem;
        margin-bottom: 0.8rem;
      }
      .markdown-body strong {
        font-weight: 600;
        color: #1e293b;
      }
      .markdown-body code {
        background: #f1f5f9;
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-size: 0.85em;
      }

      /* Animations */
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .message-anim {
        animation: slideIn 0.3s ease-out forwards;
      }

      /* Mobile Safe Area */
      .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 h-full flex flex-col antialiased">
    <!-- Header Desktop/Mobile -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-30 px-4 py-3 md:px-8">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
            <i class="fa-solid fa-robot text-lg"></i>
          </div>
          <div>
            <h1 class="font-bold text-lg md:text-xl tracking-tight text-slate-800 leading-none">KawanKampus</h1>
            <div class="flex items-center gap-1.5 mt-1">
              <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
              <span class="text-[10px] md:text-xs font-medium text-slate-500 uppercase tracking-wider">AI Assistant Online</span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="window.location.reload()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
            <i class="fa-solid fa-rotate-right"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 flex flex-col w-full max-w-6xl mx-auto overflow-hidden relative">
      <!-- Area Pesan -->
      <div id="chat-messages" class="flex-1 overflow-y-auto chat-scroll px-4 py-6 md:px-8 flex flex-col space-y-6">
        <!-- Bot Initial Message -->
        <div class="flex justify-start message-anim">
          <div class="max-w-[85%] md:max-w-[70%] bg-white border border-slate-200 shadow-sm p-4 rounded-2xl rounded-tl-none">
            <p class="text-slate-700 leading-relaxed text-sm md:text-base">
              Halo Sobat Mahasiswa! 👋 Aku <strong>KawanKampus</strong>. Ada yang bisa aku bantu hari ini? Bisa tanya soal tugas, minta rekomendasi tempat nugas, atau sekedar curhat.
            </p>
          </div>
        </div>
      </div>

      <!-- Quick Actions Container -->
      <div class="px-4 md:px-8 py-2">
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
          <button
            onclick="quickReply('Tolong ringkas materi kuliahku')"
            class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-full text-xs md:text-sm font-medium text-slate-600 hover:border-indigo-500 hover:text-indigo-600 transition-all shrink-0 shadow-sm"
          >
            <i class="fa-solid fa-file-lines text-indigo-500"></i> Ringkas Materi
          </button>
          <button
            onclick="mintaRekomendasiTempat()"
            class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-full text-xs md:text-sm font-medium text-slate-600 hover:border-teal-500 hover:text-teal-600 transition-all shrink-0 shadow-sm"
          >
            <i class="fa-solid fa-location-dot text-teal-500"></i> Tempat Nugas Terdekat
          </button>
          <button
            onclick="quickReply('Ide judul skripsi IT yang menarik')"
            class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-full text-xs md:text-sm font-medium text-slate-600 hover:border-orange-500 hover:text-orange-600 transition-all shrink-0 shadow-sm"
          >
            <i class="fa-solid fa-lightbulb text-orange-500"></i> Ide
          </button>
        </div>
      </div>

      <!-- Input Area -->
      <div class="p-4 md:px-8 md:pb-8 bg-slate-50/80 backdrop-blur-sm border-t border-slate-200 md:border-none">
        <div class="max-w-4xl mx-auto">
          <form id="chat-form" class="relative group">
            <input
              type="text"
              id="chat-input"
              class="w-full bg-white border border-slate-200 rounded-2xl md:rounded-3xl pl-5 pr-14 py-4 md:py-5 text-sm md:text-base shadow-lg shadow-slate-200/50 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all placeholder:text-slate-400"
              placeholder="Tanyakan sesuatu..."
              autocomplete="off"
            />
            <button
              type="submit"
              id="send-btn"
              class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 md:w-12 md:h-12 bg-indigo-600 text-white rounded-xl md:rounded-2xl flex items-center justify-center hover:bg-indigo-700 active:scale-95 disabled:opacity-50 disabled:active:scale-100 transition-all shadow-md shadow-indigo-200"
            >
              <i class="fa-solid fa-arrow-up text-lg"></i>
            </button>
          </form>
          <p class="text-[10px] text-center text-slate-400 mt-3 uppercase tracking-widest font-medium">KawanKampus AI Engine • v2.0 Pro</p>
        </div>
      </div>
      <div class="safe-area-bottom"></div>
    </main>

    <script>
      let isWaiting = false;
      let conversationHistory = [];
      const chatMessages = document.getElementById("chat-messages");
      const chatInput = document.getElementById("chat-input");
      const sendBtn = document.getElementById("send-btn");

      function scrollToBottom() {
        chatMessages.scrollTo({
          top: chatMessages.scrollHeight,
          behavior: "smooth",
        });
      }

      function appendMessage(text, sender, isHTML = false) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `flex ${sender === "user" ? "justify-end" : "justify-start"} w-full message-anim`;

        let content = text;
        if (sender === "bot" && !isHTML) {
          content = marked.parse(text);
        }

        const bubbleClass = sender === "user" ? "bg-indigo-600 text-white rounded-2xl rounded-tr-none shadow-md shadow-indigo-100" : "bg-white border border-slate-200 text-slate-700 rounded-2xl rounded-tl-none shadow-sm";

        msgDiv.innerHTML = `
          <div class="${bubbleClass} px-4 py-3 md:px-5 md:py-4 max-w-[85%] md:max-w-[75%] overflow-hidden">
            <div class="${sender === "bot" && !isHTML ? "markdown-body" : "text-sm md:text-base leading-relaxed"}">
              ${content}
            </div>
          </div>
        `;

        chatMessages.appendChild(msgDiv);
        scrollToBottom();
      }

      function showTyping() {
        const div = document.createElement("div");
        div.id = "typing-indicator";
        div.className = "flex justify-start w-full message-anim";
        div.innerHTML = `
          <div class="bg-white border border-slate-200 px-4 py-3 rounded-2xl rounded-tl-none flex space-x-1.5 items-center shadow-sm">
            <div class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce"></div>
            <div class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style="animation-delay:0.2s"></div>
            <div class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style="animation-delay:0.4s"></div>
          </div>
        `;
        chatMessages.appendChild(div);
        scrollToBottom();
      }

      async function executeChat(promptToBackend) {
        if (isWaiting) return;
        isWaiting = true;
        sendBtn.disabled = true;
        showTyping();

        try {
          // Simulasi Fetch ke Backend (Ganti URL dengan endpoint asli Anda)
          const response = await fetch("http://localhost:5000/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: promptToBackend, history: conversationHistory }),
          });

          const data = await response.json();
          document.getElementById("typing-indicator")?.remove();

          if (data.reply) {
            appendMessage(data.reply, "bot");
            conversationHistory.push({ role: "user", parts: [{ text: promptToBackend }] });
            conversationHistory.push({ role: "model", parts: [{ text: data.reply }] });
          } else {
            appendMessage("Maaf, sistem sedang sibuk. Coba sebentar lagi ya.", "bot");
          }
        } catch (err) {
          document.getElementById("typing-indicator")?.remove();
          appendMessage("❌ **Koneksi Gagal**: Pastikan server backend Anda menyala.", "bot");
        } finally {
          isWaiting = false;
          sendBtn.disabled = false;
          chatInput.focus();
        }
      }

      function processChat(msg) {
        if (!msg.trim() || isWaiting) return;
        appendMessage(msg, "user");
        chatInput.value = "";
        executeChat(msg);
      }

      function quickReply(text) {
        processChat(text);
      }

      // FITUR LOKASI PRO
      function mintaRekomendasiTempat() {
        if (isWaiting) return;

        if (!navigator.geolocation) {
          appendMessage("Fitur lokasi tidak didukung di browser ini.", "bot");
          return;
        }

        const tempId = "loc-loading";
        const loadingDiv = document.createElement("div");
        loadingDiv.id = tempId;
        loadingDiv.className = "flex justify-start w-full message-anim";
        loadingDiv.innerHTML = `
          <div class="bg-teal-50 border border-teal-100 px-4 py-3 rounded-2xl rounded-tl-none flex items-center gap-3 shadow-sm">
            <div class="relative flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-teal-500"></span>
            </div>
            <span class="text-sm font-medium text-teal-700">Mendeteksi koordinat lokasimu...</span>
          </div>
        `;
        chatMessages.appendChild(loadingDiv);
        scrollToBottom();

        navigator.geolocation.getCurrentPosition(
          (position) => {
            document.getElementById(tempId)?.remove();
            const { latitude, longitude } = position.coords;

            const mapCard = `
              <div class="rounded-xl overflow-hidden border border-slate-200 bg-white shadow-sm mb-3">
                <iframe width="100%" height="200" frameborder="0" src="https://maps.google.com/maps?q=${latitude},${longitude}&z=14&output=embed"></iframe>
                <div class="p-3 flex items-center gap-2 bg-slate-50 border-t border-slate-100">
                  <i class="fa-solid fa-location-dot text-teal-600"></i>
                  <span class="text-xs font-semibold text-slate-600">Lokasi berhasil dikunci</span>
                </div>
              </div>
              <p class="text-sm">Sedang mencarikan tempat nugas/nongkrong terbaik di sekitarmu...</p>
            `;
            appendMessage(mapCard, "bot", true);

            const prompt = `Cari 3 tempat nugas/kafe terbaik dekat koordinat Lat: ${latitude}, Lon: ${longitude}. Sebutkan nama tempat, jarak perkiraan, dan kenapa tempat itu cocok buat mahasiswa.`;
            executeChat(prompt);
          },
          (error) => {
            document.getElementById(tempId)?.remove();
            appendMessage("Gagal mengakses lokasi. Pastikan GPS aktif dan izin diberikan.", "bot");
          },
        );
      }

      document.getElementById("chat-form").addEventListener("submit", (e) => {
        e.preventDefault();
        processChat(chatInput.value);
      });

      // Focus on start
      window.onload = () => chatInput.focus();
    </script>
  </body>
</html>
